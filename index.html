<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Apply the theme before first paint: dark is the default,
         a saved preference wins. Prevents any flash of light. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme') || 'dark';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="180x180" href="/favicon-logo.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#131313" />
    <meta
      name="description"
      content="Abdalrahman Hajjo is a full-stack developer in Tripoli, Lebanon building fast, reliable web and mobile apps with React, Node.js, and Flutter."
    />
    <link rel="apple-touch-icon" href="/favicon-logo.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Preload the hero illustration — it's the largest above-the-fold paint -->
    <link rel="preload" as="image" href="/images/character.webp" fetchpriority="high" />

    <!-- Social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Abdalrahman Hajjo - Full Stack Developer" />
    <meta
      property="og:description"
      content="Full-stack developer in Tripoli, Lebanon building fast, reliable web and mobile apps with React, Node.js, and Flutter."
    />
    <meta property="og:image" content="/logo512.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Fonts: preconnect then load once, swap to avoid blocking render -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />

    <title>Abdalrahman Hajjo - Full Stack Developer</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
